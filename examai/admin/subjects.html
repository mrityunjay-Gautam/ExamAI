<h1>Manage Subjects</h1>
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Subjects | ExamAI Admin</title>
  <link rel="stylesheet" href="admin.css">
  <style>
    .table-box{
      margin-top:30px;
      overflow-x:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 3px 10px rgba(0,0,0,0.1);
    }

    th,td{
      padding:14px;
      border-bottom:1px solid #e5e7eb;
      text-align:left;
    }

    th{
      background:#eef2ff;
    }

    .danger-btn{
      background:#dc2626;
      color:white;
      border:none;
      padding:8px 12px;
      border-radius:6px;
      cursor:pointer;
    }

    .success-text{
      color:green;
      margin-top:10px;
    }

    .error-text{
      color:red;
      margin-top:10px;
    }

    .form-grid{
      display:grid;
      gap:12px;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <h2>ExamAI Admin</h2>
    <ul>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="subjects.html">Manage Subjects</a></li>
      <li><a href="upload-paper.html">Upload Papers</a></li>
      <li><a href="manage-papers.html">Manage Papers</a></li>
      <li><a href="login.html">Logout</a></li>
    </ul>
  </div>

  <div class="main">
    <h1>Manage Subjects</h1>

    <div class="card form-grid">
      <select id="type" onchange="toggleSubjectFields()">
        <option value="university">University Subject</option>
        <option value="board">Board Subject</option>
      </select>

      <div id="universityFields">
        <input id="university" type="text" placeholder="University (Example: RGPV)">
        <input id="branch" type="text" placeholder="Branch (Example: CSE)">
        <input id="semester" type="text" placeholder="Semester (Example: 3)">
      </div>

      <div id="boardFields" style="display:none;">
        <input id="board" type="text" placeholder="Board (Example: CBSE)">
        <input id="className" type="text" placeholder="Class (Example: 12)">
        <input id="stream" type="text" placeholder="Stream (Example: Science)">
      </div>

      <input id="subject" type="text" placeholder="Subject Name (Example: Physics)">
      <button onclick="addSubject()">Add Subject</button>
      <p id="subjectMessage"></p>
    </div>

    <div class="table-box">
      <table>
        <thead>
          <tr>
            <th>Type</th>
            <th>Main Info</th>
            <th>Extra Info</th>
            <th>Subject</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="subjectsTableBody">
          <tr>
            <td colspan="5">Loading subjects...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const API_BASE = "https://examai-6mav.onrender.com/api"

    function toggleSubjectFields() {
      const type = document.getElementById("type").value
      document.getElementById("universityFields").style.display = type === "university" ? "block" : "none"
      document.getElementById("boardFields").style.display = type === "board" ? "block" : "none"
    }

    async function loadSubjects() {
      const tableBody = document.getElementById("subjectsTableBody")
      tableBody.innerHTML = `<tr><td colspan="5">Loading subjects...</td></tr>`

      try {
        const response = await fetch(`${API_BASE}/subjects`)
        const data = await response.json()

        if (!data.success || !data.subjects || data.subjects.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="5">No subjects found.</td></tr>`
          return
        }

        tableBody.innerHTML = data.subjects.map((item) => {
          const mainInfo = item.type === "university"
            ? `${item.university || "-"}`
            : `${item.board || "-"}`

          const extraInfo = item.type === "university"
            ? `${item.branch || "-"} | Semester ${item.semester || "-"}`
            : `Class ${item.className || "-"} | ${item.stream || "-"}`

          return `
            <tr>
              <td>${item.type || "-"}</td>
              <td>${mainInfo}</td>
              <td>${extraInfo}</td>
              <td>${item.subject || "-"}</td>
              <td><button class="danger-btn" onclick="deleteSubject('${item.id}')">Delete</button></td>
            </tr>
          `
        }).join("")
      } catch (error) {
        console.log("LOAD SUBJECTS ERROR:", error)
        tableBody.innerHTML = `<tr><td colspan="5">Failed to load subjects.</td></tr>`
      }
    }

    async function addSubject() {
      const type = document.getElementById("type").value
      const university = document.getElementById("university").value.trim()
      const branch = document.getElementById("branch").value.trim()
      const semester = document.getElementById("semester").value.trim()
      const board = document.getElementById("board").value.trim()
      const className = document.getElementById("className").value.trim()
      const stream = document.getElementById("stream").value.trim()
      const subject = document.getElementById("subject").value.trim()
      const message = document.getElementById("subjectMessage")

      try {
        const response = await fetch(`${API_BASE}/subjects`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            type,
            university,
            branch,
            semester,
            board,
            className,
            stream,
            subject
          })
        })

        const data = await response.json()

        if (data.success) {
          message.className = "success-text"
          message.innerText = data.message

          document.getElementById("university").value = ""
          document.getElementById("branch").value = ""
          document.getElementById("semester").value = ""
          document.getElementById("board").value = ""
          document.getElementById("className").value = ""
          document.getElementById("stream").value = ""
          document.getElementById("subject").value = ""

          loadSubjects()
        } else {
          message.className = "error-text"
          message.innerText = data.message || "Failed to add subject"
        }
      } catch (error) {
        console.log("ADD SUBJECT ERROR:", error)
        message.className = "error-text"
        message.innerText = "Failed to add subject"
      }
    }

    async function deleteSubject(id) {
      const confirmDelete = confirm("Are you sure you want to delete this subject?")
      if (!confirmDelete) return

      try {
        const response = await fetch(`${API_BASE}/subjects/${id}`, {
          method: "DELETE"
        })

        const data = await response.json()

        if (data.success) {
          loadSubjects()
        } else {
          alert(data.message || "Failed to delete subject")
        }
      } catch (error) {
        console.log("DELETE SUBJECT ERROR:", error)
        alert("Failed to delete subject")
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      toggleSubjectFields()
      loadSubjects()
    })
  </script>

</body>

</html>
